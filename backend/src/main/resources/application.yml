server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: chileme-backend

  datasource:
    url: jdbc:mysql://localhost:3306/chileme?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      max-lifetime: 120000
      minimum-idle: 5
      maximum-pool-size: 20

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  ai:
    openai:
      base-url: https://api.openai.com
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  global-config:
    banner: false
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

# 自定义配置
chileme:
  check-in:
    start-time: "06:00"
    end-time: "09:30"
    on-time-score: 10
    late-score: 5
    break-card-limit: 3
  jwt:
    secret: chileme-jwt-secret-key-2026-very-strong
    expire: 604800
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    bucket: ${OSS_BUCKET:chileme-images}
    access-key: ${OSS_ACCESS_KEY:}
    secret-key: ${OSS_SECRET_KEY:}
  reminder:
    batch-size: 100
    cron: "0 * * * * ?"

logging:
  level:
    com.chileme: DEBUG
